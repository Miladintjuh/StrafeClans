name: Windows release build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Publish Windows x64
        shell: pwsh
        run: ./publish-windows.ps1
      - name: Upload portable ZIP folder
        uses: actions/upload-artifact@v4
        with:
          name: StrafeLab-win-x64
          path: publish/StrafeLab-win-x64
